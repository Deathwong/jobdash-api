services:
  postgres:
    image: 'postgres:latest'
    env_file:
      - .env
    environment:
      - 'POSTGRES_DB=jobdash-api'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
    ports:
      - '5432'

  api:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres